services:
  backend:
    build: .
    container_name: su-server
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      database: 
        condition: service_healthy
    develop:
      watch:
        - path: .
          target: /app
          action: rebuild

  database:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=yion
      - POSTGRES_DB=sudb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sudb"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  default:
    name: fullstack-network

volumes:
  pgdata:
